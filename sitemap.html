<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Structure — dots mag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #F7F6F2;
    color: #1a1a1a;
    padding: 80px 60px;
    min-height: 100vh;
  }

  .header { margin-bottom: 80px; }
  .header__eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 16px;
  }
  .header__title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 400;
    line-height: 1;
    margin-bottom: 12px;
  }
  .header__sub { font-size: 14px; color: #888; margin-top: 8px; }
  .header__meta {
    display: flex;
    gap: 32px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid #ddd;
  }
  .header__meta-item { font-size: 12px; color: #888; }
  .header__meta-item span {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 4px;
  }

  .nd {
    display: inline-flex;
    align-items: baseline;
    gap: 10px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 400;
    white-space: nowrap;
  }
  .nd--home {
    background: #371e9c;
    color: #fff;
    font-weight: 500;
    font-size: 15px;
    padding: 12px 24px;
  }
  .nd--section { background: #1a1a1a; color: #fff; font-weight: 500; }
  .nd--page { background: #fff; color: #1a1a1a; border: 1px solid #ddd; }
  .nd--article { background: transparent; color: #555; border: 1px solid #e8e8e8; font-size: 12px; }
  .nd--placeholder { background: transparent; color: #bbb; border: 1px dashed #ddd; font-size: 12px; }
  .nd__tag {
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.5;
    font-weight: 400;
  }

  .legend {
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid #ddd;
    display: flex;
    gap: 32px;
    align-items: center;
  }
  .legend__label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #bbb;
    margin-right: 8px;
  }
  .legend__item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; }
  .legend__dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend__dot--accent { background: #371e9c; }
  .legend__dot--dark { background: #1a1a1a; }
</style>
</head>
<body>

<div class="header">
  <div class="header__eyebrow">dots mag — Site Structure</div>
  <div class="header__title">Sitemap</div>
  <div class="header__sub" id="sitemap-sub">Issue 01 기준 · 2026.06</div>
  <div class="header__meta" id="sitemap-meta"></div>
</div>

<div id="vis-tree"></div>

<div class="legend">
  <span class="legend__label">Legend</span>
  <div class="legend__item"><div class="legend__dot legend__dot--accent"></div> Root / Home</div>
  <div class="legend__item"><div class="legend__dot legend__dot--dark"></div> Main pages</div>
  <div class="legend__item"><div class="legend__dot" style="background:#fff; border:1px solid #ddd;"></div> Sub pages</div>
  <div class="legend__item"><div class="legend__dot" style="background:transparent; border:1px solid #ccc;"></div> Articles (live)</div>
  <div class="legend__item"><div class="legend__dot" style="background:transparent; border:1px dashed #ccc;"></div> Articles (WIP)</div>
</div>

<script src="js/data.js"></script>
<script>
(function () {
  const issue = DOTSMAG.issues[0];
  const contributors = DOTSMAG.getIssueContributors(issue.id);
  const articles = DOTSMAG.getIssueArticles(issue.id);

  /* group articles by section */
  const sections = {};
  articles.forEach(a => {
    const key = a.section;
    if (!sections[key]) sections[key] = [];
    sections[key].push(a);
  });

  /* static page count: index + sitemap + issues + issue01 + masthead + about + appendix + articles */
  const staticPages = 2; /* index + sitemap */
  const mainPages  = 4; /* issues, issue01, masthead, about */
  const pageCount  = staticPages + mainPages + articles.length + 1; /* +1 appendix */

  /* ── meta bar ── */
  document.getElementById('sitemap-meta').innerHTML = `
    <div class="header__meta-item"><span>Pages</span>${pageCount}</div>
    <div class="header__meta-item"><span>Articles</span>${articles.length}</div>
    <div class="header__meta-item"><span>Contributors</span>${contributors.length}</div>
    <div class="header__meta-item"><span>Cadence</span>반기 발간</div>
  `;

  /* ── tree helpers ── */
  function vline(h) {
    return `<div style="width:1px;height:${h}px;background:#ddd;"></div>`;
  }
  function hline(w) {
    return `<div style="width:${w}px;height:1px;background:#ddd;flex-shrink:0;"></div>`;
  }
  function sectionLabel(text) {
    return `<div style="font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:#bbb;padding-left:18px;margin-bottom:4px;">${text}</div>`;
  }

  /* ── build article rows grouped by section ── */
  function buildArticleRows() {
    const sectionOrder = ['intro', '1', '2', '3', '4'];
    const sectionMeta = {
      'intro': null,
      '1': 'Section 1 · Business — 역사 및 기업 사례',
      '2': 'Section 2 · Business × Design — 소비자 선택 국면',
      '3': 'Section 3 · Business × Engineering — 기술적 측면',
      '4': 'Section 4 · 최종 제언',
    };

    let html = '';
    sectionOrder.forEach(sec => {
      const group = sections[sec];
      if (!group) return;
      const isWip = group.every(a => !a.readMin);
      const ndClass = isWip ? 'nd--placeholder' : 'nd--article';
      const tag = isWip ? '<span class="nd__tag">WIP</span>' : '';

      let inner = '';
      if (group.length === 1) {
        inner = `<div class="nd ${ndClass}">${group[0].titleKo} ${tag}</div>`;
      } else {
        const cards = group.map(a => `<div class="nd ${ndClass}">${a.titleKo} ${tag}</div>`).join('\n          ');
        inner = `
          ${sectionMeta[sec] ? sectionLabel(sectionMeta[sec]) : ''}
          <div style="display:flex;gap:6px;">
            ${cards}
          </div>`;
      }

      if (group.length === 1 && sec === 'intro') {
        html += `
    <div style="display:flex;align-items:center;">
      ${hline(40)}
      ${inner}
    </div>`;
      } else {
        html += `
    <div style="display:flex;align-items:flex-start;">
      ${hline(40)}
      <div style="display:flex;flex-direction:column;gap:4px;">
        ${sectionMeta[sec] ? sectionLabel(sectionMeta[sec]) : ''}
        <div style="display:flex;gap:6px;">
          ${group.map(a => `<div class="nd ${ndClass}">${a.titleKo}${isWip ? ' <span class="nd__tag">WIP</span>' : ''}</div>`).join('\n          ')}
        </div>
      </div>
    </div>`;
      }
    });

    /* appendix — static */
    html += `
    <div style="display:flex;align-items:center;">
      ${hline(40)}
      <div class="nd nd--article">Appendix — 케이스 스터디 (지쿠 · 카카오T · 쏘카 · 타다)</div>
    </div>`;

    return html;
  }

  /* ── render full tree ── */
  document.getElementById('vis-tree').innerHTML = `
  <!-- Root -->
  <div style="display:flex;align-items:center;margin-bottom:0;">
    <div class="nd nd--home">dots mag <span class="nd__tag">Home</span></div>
  </div>

  <!-- L1 stem -->
  <div style="display:flex;height:32px;padding-left:120px;">
    <div style="width:1px;background:#ddd;margin-right:159px;"></div>
    <div style="width:1px;background:#ddd;margin-right:179px;"></div>
    <div style="width:1px;background:#ddd;"></div>
  </div>

  <!-- L1 horizontal bar -->
  <div style="display:flex;align-items:center;padding-left:120px;">
    <div style="height:1px;background:#ddd;width:480px;"></div>
  </div>

  <!-- L1 nodes: Issues / Masthead / About -->
  <div style="display:flex;gap:0;padding-left:120px;margin-top:0;">
    <div style="display:flex;flex-direction:column;align-items:center;margin-right:100px;">
      ${vline(16)}
      <div class="nd nd--section">Issues <span class="nd__tag">Archive</span></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;margin-right:100px;">
      ${vline(16)}
      <div class="nd nd--section">Masthead <span class="nd__tag">Team</span></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      ${vline(16)}
      <div class="nd nd--section">About <span class="nd__tag">Magazine</span></div>
    </div>
  </div>

  <!-- Issues → Issue 01 stem -->
  <div style="height:32px;display:flex;padding-left:120px;">
    <div style="width:1px;background:#ddd;"></div>
  </div>

  <!-- Issue 01 node -->
  <div style="display:flex;align-items:center;padding-left:120px;">
    ${hline(40)}
    <div class="nd nd--page">Issue 01 · ${issue.titleKo} <span class="nd__tag">${issue.date}</span></div>
  </div>

  <!-- Issue 01 → Articles stem -->
  <div style="height:24px;display:flex;padding-left:160px;">
    <div style="width:1px;background:#ddd;"></div>
  </div>

  <!-- Articles label -->
  <div style="padding-left:160px;">
    <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#bbb;margin-bottom:16px;">Articles (${articles.length})</div>
  </div>

  <!-- Article rows -->
  <div style="display:flex;flex-direction:column;gap:8px;padding-left:160px;">
    ${buildArticleRows()}
  </div>
  `;
})();
</script>
</body>
</html>
